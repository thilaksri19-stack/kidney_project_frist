<!DOCTYPE html>
<html lang="en">
<head>
    <title>CKD Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <h2>🩺 CKD Prediction System</h2>
    <p class="subtitle">Enter patient details to check kidney condition</p>

    <form action="/predict" method="post">

        <div class="input-group">
            <label>Serum Creatinine</label>
            <input type="number" step="any" name="sc" placeholder="e.g. 1.2" required>
        </div>

        <div class="input-group">
            <label>Potassium</label>
            <input type="number" step="any" name="pot" placeholder="e.g. 4.5" required>
        </div>

        <div class="input-group">
            <label>Blood Urea</label>
            <input type="number" step="any" name="bu" placeholder="e.g. 40" required>
        </div>

        <div class="input-group">
            <label>Sodium</label>
            <input type="number" step="any" name="sod" placeholder="e.g. 140" required>
        </div>

        <!-- Dropdowns instead of typing -->
        <div class="input-group">
            <label>Diabetes</label>
            <select name="dm" required>
                <option value="">Select</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>
        </div>

        <div class="input-group">
            <label>Coronary Artery Disease</label>
            <select name="cad" required>
                <option value="">Select</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>
        </div>

        <div class="input-group">
            <label>Pedal Edema</label>
            <select name="pe" required>
                <option value="">Select</option>
                <option value="1">Yes</option>
                <option value="0">No</option>
            </select>
        </div>

        <div class="input-group">
            <label>Appetite</label>
            <select name="appet" required>
                <option value="">Select</option>
                <option value="0">Good</option>
                <option value="1">Poor</option>
            </select>
        </div>

        <button type="submit">🔍 Predict</button>
    </form>

    <!-- Result Box -->
    {% if prediction_text %}
    <div class="result-box">
        <h3>{{ prediction_text }}</h3>
    </div>
    {% endif %}

</div>

</body>
</html>
